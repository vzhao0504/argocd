apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/vzhao0504/argocd.git
    targetRevision: HEAD
    path: gitops/basic
  destination:
    server: https://192.168.0.101
    namespace: alto
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true